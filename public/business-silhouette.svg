<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="60%" stop-color="#060d1a"/>
      <stop offset="100%" stop-color="#020608"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floorGlow" cx="50%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="silhouette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0d1820"/>
    </linearGradient>
    <linearGradient id="suitHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3448"/>
      <stop offset="50%" stop-color="#152535"/>
      <stop offset="100%" stop-color="#0d1a28"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <rect width="1920" height="1080" fill="url(#floorGlow)"/>

  <!-- Subtle grid lines -->
  <g stroke="#06b6d4" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="216" x2="1920" y2="216"/>
    <line x1="0" y1="432" x2="1920" y2="432"/>
    <line x1="0" y1="648" x2="1920" y2="648"/>
    <line x1="0" y1="864" x2="1920" y2="864"/>
    <line x1="384" y1="0" x2="384" y2="1080"/>
    <line x1="768" y1="0" x2="768" y2="1080"/>
    <line x1="1152" y1="0" x2="1152" y2="1080"/>
    <line x1="1536" y1="0" x2="1536" y2="1080"/>
  </g>

  <!-- Faint horizontal scan lines near figure for depth -->
  <rect x="560" y="880" width="800" height="2" fill="#06b6d4" fill-opacity="0.06"/>
  <rect x="660" y="900" width="600" height="1" fill="#06b6d4" fill-opacity="0.04"/>

  <!-- Figure group, centered at x=960 -->
  <g filter="url(#softShadow)" transform="translate(960, 540)">

    <!-- Shadow on floor -->
    <ellipse cx="0" cy="510" rx="160" ry="22" fill="#000" fill-opacity="0.5"/>

    <!-- LEGS -->
    <!-- Left leg (viewer's right) -->
    <path d="M-62,420 L-78,530 L-42,530 L-30,420 Z" fill="url(#silhouette)"/>
    <!-- Right leg (viewer's left) -->
    <path d="M30,420 L42,530 L78,530 L62,420 Z" fill="url(#silhouette)"/>

    <!-- Shoe left -->
    <path d="M-78,520 L-100,530 L-36,530 L-36,522 Z" fill="#0d1820"/>
    <!-- Shoe right -->
    <path d="M78,520 L100,530 L36,530 L36,522 Z" fill="#0d1820"/>

    <!-- TORSO / SUIT JACKET -->
    <!-- Main body -->
    <path d="M-90,140 L-105,420 L105,420 L90,140 Z" fill="url(#suitHighlight)"/>

    <!-- Left lapel -->
    <path d="M-90,140 L-30,200 L-20,140 Z" fill="#0f1f2e"/>
    <!-- Right lapel -->
    <path d="M90,140 L30,200 L20,140 Z" fill="#0f1f2e"/>

    <!-- Shirt / tie area between lapels -->
    <path d="M-20,140 L-8,200 L0,380 L8,200 L20,140 Z" fill="#12202e"/>
    <!-- Tie -->
    <path d="M-6,160 L0,180 L6,160 L4,340 L0,360 L-4,340 Z" fill="#0a1520"/>

    <!-- Jacket button line -->
    <circle cx="0" cy="310" r="3" fill="#0f1e2c"/>
    <circle cx="0" cy="340" r="3" fill="#0f1e2c"/>

    <!-- Pocket square hint -->
    <path d="M-75,200 L-55,200 L-58,215 L-72,215 Z" fill="#1a3040"/>

    <!-- LEFT ARM -->
    <path d="M-90,145 L-145,320 L-115,330 L-72,160 Z" fill="url(#suitHighlight)"/>
    <!-- Left cuff -->
    <path d="M-148,310 L-112,322 L-118,345 L-154,332 Z" fill="#12202e"/>
    <!-- Left hand -->
    <ellipse cx="-136" cy="350" rx="18" ry="22" fill="#1a2a3a"/>

    <!-- RIGHT ARM -->
    <path d="M90,145 L145,320 L115,330 L72,160 Z" fill="url(#suitHighlight)"/>
    <!-- Right cuff -->
    <path d="M148,310 L112,322 L118,345 L154,332 Z" fill="#12202e"/>
    <!-- Right hand -->
    <ellipse cx="136" cy="350" rx="18" ry="22" fill="#1a2a3a"/>

    <!-- NECK -->
    <rect x="-18" y="60" width="36" height="90" rx="6" fill="#1a2a3a"/>

    <!-- COLLAR -->
    <path d="M-18,140 L-38,160 L0,152 L38,160 L18,140 Z" fill="#0f1e2e"/>

    <!-- HEAD -->
    <!-- Neck transition -->
    <ellipse cx="0" cy="55" rx="22" ry="14" fill="#1a2a3a"/>
    <!-- Main head shape -->
    <ellipse cx="0" cy="-20" rx="68" ry="80" fill="#1a2a3a"/>
    <!-- Slight jaw definition -->
    <path d="M-42,30 Q0,60 42,30 L38,50 Q0,75 -38,50 Z" fill="#162232"/>
    <!-- Hair area / top of head darkening -->
    <ellipse cx="0" cy="-78" rx="64" ry="30" fill="#0f1a28"/>

    <!-- Subtle ear left -->
    <ellipse cx="-66" cy="-10" rx="9" ry="14" fill="#1a2a3a"/>
    <!-- Subtle ear right -->
    <ellipse cx="66" cy="-10" rx="9" ry="14" fill="#1a2a3a"/>

    <!-- Cyan edge glow on silhouette outline -->
    <path d="M0,-100 Q68,-90 68,0 Q68,100 0,120 Q-68,100 -68,0 Q-68,-90 0,-100 Z"
          fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.25" filter="url(#glowFilter)"/>
    <path d="M-90,140 L-105,420 L105,420 L90,140 Z"
          fill="none" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.15"/>

  </g>

  <!-- Subtle cyan accent line at bottom -->
  <rect x="0" y="1074" width="1920" height="2" fill="#06b6d4" fill-opacity="0.3"/>
</svg>
